name: Bist Engine Test
on:
  workflow_dispatch: # Manuel başlatma butonu

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install Dependencies
        # Puppeteer'ın takılmasını önlemek için temiz kurulum
        run: npm install 
        
      - name: Run Bot
        # Buranın engine.js olduğundan emin oluyoruz
        run: node engine.js 
        env:
          TRADINGVIEW_TOKEN: ${{ secrets.TRADINGVIEW_TOKEN }}
          TRADINGVIEW_CHAT_ID: ${{ secrets.TRADINGVIEW_CHAT_ID }}
